<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StreamBoard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --glass: rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.8);
  --glass-shadow: rgba(100,120,160,0.15);
  --text: #1a2340;
  --text-muted: #6b7a99;
  --accent: #5b6ef5;
  --card-radius: 18px;
  --pill-radius: 50px;
  --want: #a78bfa;
  --watching: #f5a623;
  --aborted: #ef4444;
  --done: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: linear-gradient(135deg, #dce6f5 0%, #e8eef7 50%, #d5e4f0 100%); min-height: 100vh; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }

#auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.auth-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 48px 36px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 8px 40px var(--glass-shadow); }
.auth-logo { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
.auth-logo span { color: var(--accent); }
.auth-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 36px; }
.auth-input { width: 100%; padding: 14px 18px; border: 1.5px solid rgba(255,255,255,0.8); border-radius: 14px; background: rgba(255,255,255,0.7); font-size: 16px; color: var(--text); outline: none; margin-bottom: 14px; }
.auth-input:focus { border-color: var(--accent); }
.auth-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; }
.auth-msg { margin-top: 16px; font-size: 14px; color: var(--text-muted); }

#app { display: none; min-height: 100vh; }

header { position: sticky; top: 0; z-index: 200; background: rgba(232,238,247,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.6); padding: 12px 16px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { font-size: 22px; font-weight: 700; }
.logo span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; }
.icon-btn { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 8px 12px; font-size: 16px; cursor: pointer; color: var(--text); }

.status-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; }
.status-tabs::-webkit-scrollbar { display: none; }
.status-tab { flex-shrink: 0; padding: 8px 16px; border-radius: var(--pill-radius); border: 1.5px solid transparent; font-size: 13px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.5); color: var(--text-muted); white-space: nowrap; }
.status-tab.active { color: #fff; }

.provider-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 12px 16px 4px; }
.provider-scroll::-webkit-scrollbar { display: none; }
.provider-pill { flex-shrink: 0; padding: 7px 16px; border-radius: var(--pill-radius); border: 1.5px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.5); font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-muted); }
.provider-pill.active { color: #fff; }

.search-wrap { padding: 8px 16px 12px; }
.search-input { width: 100%; padding: 12px 18px; border-radius: var(--pill-radius); border: 1.5px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.7); font-size: 15px; color: var(--text); outline: none; }

main { padding: 12px 16px 100px; }
.section-header { font-size: 18px; font-weight: 700; margin: 16px 0 12px; }

.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 700px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 900px) { .grid { grid-template-columns: repeat(5, 1fr); } }
@media (min-width: 1100px) { .grid { grid-template-columns: repeat(6, 1fr); } }

.card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: var(--card-radius); overflow: hidden; box-shadow: 0 4px 20px var(--glass-shadow); transition: transform 0.2s; cursor: pointer; }
.card:active { transform: scale(0.97); }
@media (hover: hover) { .card:hover { transform: translateY(-3px); } }
.poster-wrap { position: relative; padding-top: 150%; background: rgba(255,255,255,0.3); }
.poster-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.poster-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.score-badge { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border-radius: 8px; padding: 3px 7px; font-size: 11px; font-weight: 700; }
.status-dot { position: absolute; top: 8px; left: 8px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; background: rgba(255,255,255,0.9); }
.card-body { padding: 10px; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { font-size: 10px; color: var(--text-muted); }

.modal-overlay { position: fixed; inset: 0; background: rgba(20,30,60,0.4); backdrop-filter: blur(8px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
@media (min-width: 600px) { .modal-overlay { align-items: center; } }
.modal { background: linear-gradient(160deg, #f0f5ff, #e8eef7); border-radius: 28px 28px 0 0; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; padding: 24px; }
@media (min-width: 600px) { .modal { border-radius: 28px; } }
.modal-handle { width: 40px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 0 auto 20px; }
.modal-poster-row { display: flex; gap: 16px; margin-bottom: 20px; }
.modal-poster { width: 90px; flex-shrink: 0; border-radius: 14px; overflow: hidden; }
.modal-poster img { width: 100%; display: block; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.modal-overview { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px; }
.modal-status-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.modal-status-btn { padding: 8px 16px; border-radius: var(--pill-radius); border: 2px solid rgba(0,0,0,0.1); font-size: 13px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.6); color: var(--text-muted); }
.modal-status-btn.active { color: #fff; }
.seasons-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.season-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(255,255,255,0.6); border-radius: 12px; margin-bottom: 8px; }
.season-label { font-size: 13px; font-weight: 600; }
.season-btns { display: flex; gap: 6px; }
.season-btn { padding: 5px 12px; border-radius: var(--pill-radius); border: 1.5px solid rgba(0,0,0,0.1); font-size: 11px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.6); color: var(--text-muted); }
.season-btn.active { color: #fff; }

.chat-fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 22px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(91,110,245,0.4); z-index: 300; display: none; align-items: center; justify-content: center; }
.chat-overlay { position: fixed; inset: 0; z-index: 400; display: none; align-items: flex-end; justify-content: center; background: rgba(20,30,60,0.3); backdrop-filter: blur(6px); }
.chat-panel { background: linear-gradient(160deg, #f0f5ff, #e8eef7); border-radius: 28px 28px 0 0; width: 100%; max-width: 560px; height: 70vh; display: flex; flex-direction: column; padding: 16px; }
.chat-handle { width: 40px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 0 auto 14px; }
.chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.msg { display: flex; }
.msg.user { justify-content: flex-end; }
.msg-bubble { max-width: 85%; border-radius: 18px; padding: 10px 14px; font-size: 14px; line-height: 1.5; }
.msg.user .msg-bubble { background: var(--accent); color: #fff; }
.msg.assistant .msg-bubble { background: rgba(255,255,255,0.8); color: var(--text); }
.chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
.chat-input { flex: 1; padding: 12px 16px; border-radius: var(--pill-radius); border: 1.5px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.8); font-size: 15px; color: var(--text); outline: none; }
.chat-send { background: var(--accent); border: none; border-radius: 50%; width: 44px; height: 44px; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; }

.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(91,110,245,0.2); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-msg { font-size: 13px; color: var(--text-muted); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">Stream<span>Board</span></div>
    <div class="auth-sub">Dein persoenliches Streaming-Dashboard</div>
    <input class="auth-input" id="auth-email" type="email" placeholder="deine@email.de">
    <button class="auth-btn" id="magic-btn">Magic Link senden</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-top">
      <div class="logo">Stream<span>Board</span></div>
      <div class="header-actions">
        <button class="icon-btn" id="search-btn">&#128269;</button>
        <button class="icon-btn" id="signout-btn">&#128100;</button>
      </div>
    </div>
    <div class="status-tabs" id="status-tabs">
      <div class="status-tab" data-tab="browse">&#127916; Entdecken</div>
      <div class="status-tab" data-tab="want">&#128278; Will ich sehen</div>
      <div class="status-tab" data-tab="watching">&#9681; Angefangen</div>
      <div class="status-tab" data-tab="aborted">&#10005; Abgebrochen</div>
      <div class="status-tab" data-tab="done">&#9989; Gesehen</div>
    </div>
  </header>
  <div id="provider-bar" class="provider-scroll" style="display:none"></div>
  <div id="search-bar" class="search-wrap" style="display:none">
    <input class="search-input" id="search-input" placeholder="Serie oder Film suchen...">
  </div>
  <main id="main-content">
    <div class="loader"><div class="spinner"></div><div class="loader-msg">Laden...</div></div>
  </main>
</div>

<button class="chat-fab" id="chat-fab">&#128172;</button>

<div class="chat-overlay" id="chat-overlay">
  <div class="chat-panel">
    <div class="chat-handle"></div>
    <div class="chat-messages" id="chat-messages">
      <div class="msg assistant"><div class="msg-bubble">Hey! Sag mir was du geguckt hast, z.B. "Hab Succession fertig" oder frag nach Empfehlungen.</div></div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chat-input" placeholder="Nachricht...">
      <button class="chat-send" id="chat-send">&#8593;</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal" id="modal-content"></div>
</div>

<script>
var SUPABASE_URL = "https://fmlinbvtvjacitrvetmb.supabase.co";
var SUPABASE_KEY = "sb_publishable_pVVXVBPplJqarZ_RYbcy0A_OgjXPHOz";
var TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiJkYWJlZDJiNjNjZmVmZjQwMzAwZmQxZmJiZmZjN2FjYiIsIm5iZiI6MTc3ODQyNDczMy42NjUsInN1YiI6IjZhMDA5YjlkM2U5ODRiOTM2NmVjMjBhNyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.-dkvM50nAGc7oQjIqTfgDcGKV--lvti4DY2tRl7MHu0";
var CLAUDE_API = "https://api.anthropic.com/v1/messages";

var PROVIDERS = {
  8:   {name:"Netflix",      color:"#E50914", short:"Netflix"},
  119: {name:"Amazon Prime", color:"#00A8E0", short:"Amazon Prime"},
  337: {name:"Disney+",      color:"#113CCF", short:"Disney+"},
  350: {name:"Apple TV+",    color:"#1C1C1E", short:"Apple TV+"},
  384: {name:"HBO Max",      color:"#5822B4", short:"HBO Max"},
  39:  {name:"WOW",          color:"#FF6B35", short:"WOW"},
  1773:{name:"RTL+",         color:"#E4002B", short:"RTL+"},
  207: {name:"Joyn",         color:"#00C896", short:"Joyn"}
};

var STATUS_CONFIG = {
  want:     {label:"Will ich sehen", icon:"&#128278;", color:"#a78bfa"},
  watching: {label:"Angefangen",     icon:"&#9681;",   color:"#f5a623"},
  aborted:  {label:"Abgebrochen",    icon:"&#10005;",  color:"#ef4444"},
  done:     {label:"Gesehen",        icon:"&#9989;",   color:"#22c55e"}
};

var sb, currentUser;
var currentTab = "browse";
var currentProvider = 8;
var userStatuses = {};
var seasonStatuses = {};
var itemStore = {};
var chatHistory = [];
var searchTimer;

sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function tmdbFetch(path) {
  var sep = path.indexOf("?") >= 0 ? "&" : "?";
  var url = "https://api.themoviedb.org/3" + path + sep + "language=de-DE&region=DE";
  return fetch(url, {headers: {Authorization: "Bearer " + TMDB_TOKEN}}).then(function(r) {
    if (!r.ok) throw new Error("TMDB " + r.status);
    return r.json();
  });
}

function setLoading(msg) {
  document.getElementById("main-content").innerHTML = '<div class="loader"><div class="spinner"></div><div class="loader-msg">' + (msg || "Laden...") + '</div></div>';
}

function setEmpty(icon, msg) {
  document.getElementById("main-content").innerHTML = '<div class="empty-state"><div class="empty-icon">' + icon + '</div>' + msg + '</div>';
}

function cardHTML(item) {
  var key = item.mediaType + "-" + item.id;
  var status = userStatuses[key] || "none";
  var score = ((item.vote_average || 0) * 10).toFixed(0);
  var scoreColor = score >= 75 ? "#22c55e" : score >= 50 ? "#f5a623" : "#ef4444";
  var title = item.title || item.name || "";
  var year = (item.release_date || item.first_air_date || "").slice(0, 4);
  var seasons = item.number_of_seasons ? item.number_of_seasons + " Staffel" + (item.number_of_seasons > 1 ? "n" : "") : "";
  var statusIcon = status !== "none" && STATUS_CONFIG[status] ? STATUS_CONFIG[status].icon : "";
  var poster = item.poster_path
    ? '<img src="https://image.tmdb.org/t/p/w300' + item.poster_path + '" alt="" loading="lazy">'
    : '<div class="poster-placeholder">&#127916;</div>';

  var sk = key + "-" + Math.random().toString(36).slice(2);
  itemStore[sk] = item;

  var html = '<div class="card" data-sk="' + sk + '">';
  html += '<div class="poster-wrap">' + poster;
  html += '<div class="score-badge" style="color:' + scoreColor + '">&#9733; ' + (item.vote_average || 0).toFixed(1) + '</div>';
  if (statusIcon) html += '<div class="status-dot">' + statusIcon + '</div>';
  html += '</div>';
  html += '<div class="card-body">';
  html += '<div class="card-title">' + title + '</div>';
  html += '<div class="card-meta">' + (year ? year : "") + (seasons ? " &bull; " + seasons : "") + '</div>';
  html += '</div></div>';
  return html;
}

function attachCardClicks() {
  document.querySelectorAll(".card").forEach(function(card) {
    card.addEventListener("click", function() {
      var sk = this.getAttribute("data-sk");
      if (sk && itemStore[sk]) openModal(itemStore[sk]);
    });
  });
}

function renderProviderBar() {
  var bar = document.getElementById("provider-bar");
  var html = '<div class="provider-pill' + (!currentProvider ? " active" : "") + '" data-pid="0" style="' + (!currentProvider ? "background:var(--accent);color:#fff" : "") + '">Alle</div>';
  Object.keys(PROVIDERS).forEach(function(id) {
    var p = PROVIDERS[id];
    var active = currentProvider === parseInt(id);
    html += '<div class="provider-pill' + (active ? " active" : "") + '" data-pid="' + id + '" style="' + (active ? "background:" + p.color + ";color:#fff;border-color:" + p.color : "") + '">' + p.short + '</div>';
  });
  bar.innerHTML = html;
  bar.querySelectorAll(".provider-pill").forEach(function(pill) {
    pill.addEventListener("click", function() {
      var pid = parseInt(this.getAttribute("data-pid"));
      currentProvider = pid === 0 ? null : pid;
      renderProviderBar();
      if (currentTab === "browse") loadBrowse();
    });
  });
}

function switchTab(tab) {
  currentTab = tab;
  var tabs = document.querySelectorAll(".status-tab");
  tabs.forEach(function(t) {
    t.className = "status-tab";
    if (t.getAttribute("data-tab") === tab) {
      t.className = "status-tab active";
      var colors = {browse:"var(--accent)", want:"var(--want)", watching:"var(--watching)", aborted:"var(--aborted)", done:"var(--done)"};
      t.style.background = colors[tab] || "var(--accent)";
      t.style.borderColor = colors[tab] || "var(--accent)";
    } else {
      t.style.background = "";
      t.style.borderColor = "";
    }
  });
  var provBar = document.getElementById("provider-bar");
  provBar.style.display = tab === "browse" ? "flex" : "none";
  if (tab === "browse") loadBrowse();
  else loadMyList(tab);
}

function loadBrowse() {
  setLoading("Lade Top-Titel...");
  var pid = currentProvider || 8;
  Promise.all([
    tmdbFetch("/discover/tv?with_watch_providers=" + pid + "&watch_region=DE&sort_by=popularity.desc&page=1"),
    tmdbFetch("/discover/movie?with_watch_providers=" + pid + "&watch_region=DE&sort_by=popularity.desc&page=1")
  ]).then(function(results) {
    var tvItems = (results[0].results || []).slice(0, 20).map(function(i) { return Object.assign({}, i, {mediaType:"series", title: i.name}); });
    var movieItems = (results[1].results || []).slice(0, 20).map(function(i) { return Object.assign({}, i, {mediaType:"movie"}); });
    var pname = currentProvider ? PROVIDERS[currentProvider].name : "Allen Anbietern";
    var html = '<div class="section-header">Top Serien auf ' + pname + '</div>';
    html += '<div class="grid">' + tvItems.map(cardHTML).join("") + '</div>';
    html += '<div class="section-header" style="margin-top:24px">Top Filme auf ' + pname + '</div>';
    html += '<div class="grid">' + movieItems.map(cardHTML).join("") + '</div>';
    document.getElementById("main-content").innerHTML = html;
    attachCardClicks();
  }).catch(function(e) {
    setEmpty("&#9888;&#65039;", "Fehler beim Laden: " + e.message);
  });
}

function loadMyList(status) {
  setLoading("Lade deine Liste...");
  sb.from("watch_status").select("*, titles(*)").eq("user_id", currentUser.id).eq("status", status).then(function(result) {
    var data = result.data;
    if (!data || data.length === 0) {
      var msgs = {want:"Noch nichts auf der Watchlist", watching:"Keine angefangenen Titel", aborted:"Keine abgebrochenen Titel", done:"Noch nichts als gesehen markiert"};
      setEmpty(STATUS_CONFIG[status] ? STATUS_CONFIG[status].icon : "&#128203;", msgs[status] || "");
      return;
    }
    var items = data.filter(function(r) { return r.titles; }).map(function(r) {
      return Object.assign({}, r.titles, {mediaType: r.titles.media_type});
    });
    var label = STATUS_CONFIG[status] ? STATUS_CONFIG[status].label : status;
    var html = '<div class="section-header">' + label + ' (' + items.length + ')</div>';
    html += '<div class="grid">' + items.map(cardHTML).join("") + '</div>';
    document.getElementById("main-content").innerHTML = html;
    attachCardClicks();
  });
}

function openModal(item) {
  var key = item.mediaType + "-" + item.id;
  var status = userStatuses[key] || "none";
  var title = item.title || item.name || "";
  var poster = item.poster_path
    ? '<img src="https://image.tmdb.org/t/p/w300' + item.poster_path + '" alt="">'
    : '<div style="height:130px;background:rgba(0,0,0,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:32px">&#127916;</div>';

  var statusBtns = Object.keys(STATUS_CONFIG).map(function(s) {
    var cfg = STATUS_CONFIG[s];
    var active = status === s;
    return '<button class="modal-status-btn' + (active ? " active" : "") + '" data-status="' + s + '" style="' + (active ? "background:" + cfg.color + ";border-color:" + cfg.color : "") + '">' + cfg.icon + ' ' + cfg.label + '</button>';
  }).join("");

  var html = '<div class="modal-handle"></div>';
  html += '<div class="modal-poster-row">';
  html += '<div class="modal-poster">' + poster + '</div>';
  html += '<div><div class="modal-title">' + title + '</div>';
  if (item.overview) html += '<div class="modal-overview">' + item.overview.slice(0, 200) + (item.overview.length > 200 ? "..." : "") + '</div>';
  html += '</div></div>';
  html += '<div class="modal-status-btns">' + statusBtns + '</div>';
  html += '<div id="seasons-container"><div class="loader-msg">Lade Staffeln...</div></div>';

  document.getElementById("modal-content").innerHTML = html;
  document.getElementById("modal-overlay").style.display = "flex";

  document.querySelectorAll(".modal-status-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var s = this.getAttribute("data-status");
      setStatus(key, s, item.mediaType, item.id, item);
      document.querySelectorAll(".modal-status-btn").forEach(function(b) {
        var bs = b.getAttribute("data-status");
        var cfg = STATUS_CONFIG[bs];
        var isActive = bs === s;
        b.className = "modal-status-btn" + (isActive ? " active" : "");
        b.style.background = isActive ? cfg.color : "";
        b.style.borderColor = isActive ? cfg.color : "";
        b.style.color = isActive ? "#fff" : "";
      });
    });
  });

  if (item.mediaType === "series") {
    tmdbFetch("/tv/" + item.id).then(function(d) {
      var seasons = (d.seasons || []).filter(function(s) { return s.season_number > 0; });
      if (seasons.length === 0) { document.getElementById("seasons-container").innerHTML = ""; return; }
      var shtml = '<div class="seasons-title">Staffeln</div>';
      seasons.forEach(function(s) {
        var ss = seasonStatuses[key] && seasonStatuses[key][s.season_number] ? seasonStatuses[key][s.season_number] : "none";
        shtml += '<div class="season-row">';
        shtml += '<div class="season-label">Staffel ' + s.season_number + (s.episode_count ? ' <span style="color:var(--text-muted);font-size:11px">(' + s.episode_count + ' Eps.)</span>' : '') + '</div>';
        shtml += '<div class="season-btns">';
        Object.keys(STATUS_CONFIG).forEach(function(sv) {
          var cfg = STATUS_CONFIG[sv];
          var active = ss === sv;
          shtml += '<button class="season-btn' + (active ? " active" : "") + '" data-sn="' + s.season_number + '" data-sv="' + sv + '" style="' + (active ? "background:" + cfg.color + ";color:#fff;border-color:" + cfg.color : "") + '">' + cfg.icon + '</button>';
        });
        shtml += '</div></div>';
      });
      document.getElementById("seasons-container").innerHTML = shtml;
      document.querySelectorAll(".season-btn").forEach(function(btn) {
        btn.addEventListener("click", function() {
          var sn = parseInt(this.getAttribute("data-sn"));
          var sv = this.getAttribute("data-sv");
          setSeasonStatus(key, sn, sv);
          var rowBtns = this.closest(".season-row").querySelectorAll(".season-btn");
          rowBtns.forEach(function(b) {
            var bsv = b.getAttribute("data-sv");
            var cfg = STATUS_CONFIG[bsv];
            var isActive = bsv === sv;
            b.className = "season-btn" + (isActive ? " active" : "");
            b.style.background = isActive ? cfg.color : "";
            b.style.color = isActive ? "#fff" : "";
            b.style.borderColor = isActive ? cfg.color : "";
          });
        });
      });
    }).catch(function() {
      document.getElementById("seasons-container").innerHTML = "";
    });
  } else {
    document.getElementById("seasons-container").innerHTML = "";
  }
}

function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
}

function setStatus(key, status, mediaType, tmdbId, item) {
  userStatuses[key] = status;
  var titleData = {
    id: key,
    tmdb_id: tmdbId,
    media_type: mediaType,
    title: item ? (item.title || item.name || key) : key,
    poster_path: item ? item.poster_path : null,
    vote_average: item ? item.vote_average : null,
    overview: item ? (item.overview || null) : null
  };
  sb.from("titles").upsert(titleData, {onConflict:"id"}).then(function() {
    sb.from("watch_status").upsert({title_id: key, user_id: currentUser.id, status: status, updated_at: new Date().toISOString()}, {onConflict:"title_id,user_id"});
  });
}

function setSeasonStatus(titleId, seasonNum, status) {
  if (!seasonStatuses[titleId]) seasonStatuses[titleId] = {};
  seasonStatuses[titleId][seasonNum] = status;
  sb.from("season_status").upsert({title_id: titleId, user_id: currentUser.id, season_number: seasonNum, status: status, updated_at: new Date().toISOString()}, {onConflict:"title_id,user_id,season_number"});
}

function loadUserStatuses() {
  sb.from("watch_status").select("*").eq("user_id", currentUser.id).then(function(r) {
    if (r.data) r.data.forEach(function(row) { userStatuses[row.title_id] = row.status; });
  });
  sb.from("season_status").select("*").eq("user_id", currentUser.id).then(function(r) {
    if (r.data) r.data.forEach(function(row) {
      if (!seasonStatuses[row.title_id]) seasonStatuses[row.title_id] = {};
      seasonStatuses[row.title_id][row.season_number] = row.status;
    });
  });
}

function showApp() {
  document.getElementById("auth-screen").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("chat-fab").style.display = "flex";
  renderProviderBar();
  document.getElementById("status-tabs").querySelectorAll(".status-tab").forEach(function(t) {
    t.addEventListener("click", function() { switchTab(this.getAttribute("data-tab")); });
  });
  loadUserStatuses();
  switchTab("browse");
}

document.getElementById("magic-btn").addEventListener("click", function() {
  var email = document.getElementById("auth-email").value.trim();
  if (!email) return;
  var msg = document.getElementById("auth-msg");
  msg.textContent = "Sende Magic Link...";
  sb.auth.signInWithOtp({email: email, options: {emailRedirectTo: "https://simyo88.github.io/Dashboard_streaming"}}).then(function(result) {
    if (result.error) msg.textContent = "Fehler: " + result.error.message;
    else msg.textContent = "Magic Link gesendet! Bitte checke deine E-Mails.";
  });
});

document.getElementById("signout-btn").addEventListener("click", function() {
  sb.auth.signOut().then(function() { location.reload(); });
});

document.getElementById("search-btn").addEventListener("click", function() {
  var bar = document.getElementById("search-bar");
  bar.style.display = bar.style.display === "none" ? "block" : "none";
  if (bar.style.display === "block") document.getElementById("search-input").focus();
});

document.getElementById("search-input").addEventListener("input", function() {
  clearTimeout(searchTimer);
  var val = this.value.trim();
  if (!val) { switchTab(currentTab); return; }
  searchTimer = setTimeout(function() {
    setLoading("Suche...");
    tmdbFetch("/search/multi?query=" + encodeURIComponent(val)).then(function(d) {
      var results = (d.results || []).filter(function(r) { return r.media_type === "tv" || r.media_type === "movie"; }).map(function(r) {
        return Object.assign({}, r, {mediaType: r.media_type === "tv" ? "series" : "movie", title: r.name || r.title});
      });
      if (!results.length) { setEmpty("&#128269;", "Keine Ergebnisse"); return; }
      var html = '<div class="section-header">Suchergebnisse</div><div class="grid">' + results.map(cardHTML).join("") + '</div>';
      document.getElementById("main-content").innerHTML = html;
      attachCardClicks();
    });
  }, 500);
});

document.getElementById("chat-fab").addEventListener("click", function() {
  var overlay = document.getElementById("chat-overlay");
  overlay.style.display = overlay.style.display === "none" ? "flex" : "none";
});

document.getElementById("chat-overlay").addEventListener("click", function(e) {
  if (e.target === this) this.style.display = "none";
});

document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

document.getElementById("chat-send").addEventListener("click", sendChat);
document.getElementById("chat-input").addEventListener("keydown", function(e) {
  if (e.key === "Enter") sendChat();
});

function addChatMsg(role, text) {
  var box = document.getElementById("chat-messages");
  var div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = '<div class="msg-bubble">' + text + '</div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function sendChat() {
  var input = document.getElementById("chat-input");
  var msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  addChatMsg("user", msg);
  chatHistory.push({role:"user", content:msg});
  var thinking = document.createElement("div");
  thinking.className = "msg assistant";
  thinking.innerHTML = '<div class="msg-bubble">...</div>';
  document.getElementById("chat-messages").appendChild(thinking);
  var summary = Object.keys(userStatuses).slice(0, 50).map(function(id) { return id + ":" + userStatuses[id]; }).join(", ");
  var system = "Du bist Assistent fuer ein Streaming-Dashboard. Status: want, watching, aborted, done. Wenn Status geaendert antworte mit XML status_update Tag mit id und status. Aktuelle Status: " + summary + ". Antworte auf Deutsch, kurz.";
  fetch(CLAUDE_API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:600, system:system, messages:chatHistory})
  }).then(function(r) { return r.json(); }).then(function(data) {
    var fullText = data.content && data.content[0] ? data.content[0].text : "Keine Antwort.";
    var regex = /<status_update>([^<]*(?:<(?!\/status_update>)[^<]*)*)<\/status_update>/g;
    var match;
    while ((match = regex.exec(fullText)) !== null) {
      try {
        var u = JSON.parse(match[1].trim());
        if (u.id && u.status) userStatuses[u.id] = u.status;
      } catch(e) {}
    }
    var clean = fullText.replace(/<status_update>[^<]*(?:<(?!\/status_update>)[^<]*)*<\/status_update>/g, "").trim();
    chatHistory.push({role:"assistant", content:clean});
    thinking.remove();
    addChatMsg("assistant", clean);
  }).catch(function() {
    thinking.remove();
    addChatMsg("assistant", "Verbindungsfehler.");
  });
}

sb.auth.getSession().then(function(result) {
  if (result.data && result.data.session) {
    currentUser = result.data.session.user;
    showApp();
  }
});

sb.auth.onAuthStateChange(function(event, session) {
  if (session && !currentUser) {
    currentUser = session.user;
    showApp();
  }
});
</script>
