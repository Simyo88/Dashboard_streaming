<html lang="de">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<style>
:root {
  --bg: #e8eef7;
  --glass: rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.8);
  --glass-shadow: rgba(100,120,160,0.15);
  --text: #1a2340;
  --text-muted: #6b7a99;
  --accent: #5b6ef5;
  --accent2: #f5705b;
  --card-radius: 18px;
  --pill-radius: 50px;
  --want: #a78bfa;
  --watching: #f5a623;
  --aborted: #ef4444;
  --done: #22c55e;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: linear-gradient(135deg, #dce6f5 0%, #e8eef7 50%, #d5e4f0 100%); min-height: 100vh; color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; }

/* Auth Screen */
#auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
.auth-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 28px; padding: 48px 36px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 8px 40px var(--glass-shadow); }
.auth-logo { font-size: 32px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.auth-logo span { color: var(--accent); }
.auth-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 36px; }
.auth-input { width: 100%; padding: 14px 18px; border: 1.5px solid rgba(255,255,255,0.8); border-radius: 14px; background: rgba(255,255,255,0.7); font-size: 16px; color: var(--text); outline: none; margin-bottom: 14px; }
.auth-input:focus { border-color: var(--accent); }
.auth-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
.auth-btn:hover { opacity: 0.9; }
.auth-msg { margin-top: 16px; font-size: 14px; color: var(--text-muted); }

/* App */
#app { display: none; min-height: 100vh; }

/* Header */
header { position: sticky; top: 0; z-index: 200; background: rgba(232,238,247,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.6); padding: 12px 16px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { font-size: 22px; font-weight: 700; }
.logo span { color: var(--accent); }
.header-actions { display: flex; gap: 8px; align-items: center; }
.icon-btn { background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; padding: 8px 12px; font-size: 16px; cursor: pointer; color: var(--text); }

/* Status tabs */
.status-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.status-tabs::-webkit-scrollbar { display: none; }
.status-tab { flex-shrink: 0; padding: 8px 16px; border-radius: var(--pill-radius); border: 1.5px solid transparent; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.5); color: var(--text-muted); white-space: nowrap; }
.status-tab.active-want { background: var(--want); color: #fff; border-color: var(--want); }
.status-tab.active-watching { background: var(--watching); color: #fff; border-color: var(--watching); }
.status-tab.active-aborted { background: var(--aborted); color: #fff; border-color: var(--aborted); }
.status-tab.active-done { background: var(--done); color: #fff; border-color: var(--done); }
.status-tab.active-browse { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Provider filter */
.provider-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 12px 16px 4px; }
.provider-scroll::-webkit-scrollbar { display: none; }
.provider-pill { flex-shrink: 0; padding: 7px 16px; border-radius: var(--pill-radius); border: 1.5px solid rgba(255,255,255,0.7); background: rgba(255,255,255,0.5); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; color: var(--text-muted); }
.provider-pill.active { color: #fff; }

/* Search bar */
.search-wrap { padding: 8px 16px 12px; }
.search-input { width: 100%; padding: 12px 18px; border-radius: var(--pill-radius); border: 1.5px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.7); font-size: 15px; color: var(--text); outline: none; }
.search-input:focus { border-color: var(--accent); }

/* Main content */
main { padding: 12px 16px 100px; }

/* Section header */
.section-header { font-size: 18px; font-weight: 700; margin: 16px 0 12px; color: var(--text); }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
@media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (min-width: 700px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 900px) { .grid { grid-template-columns: repeat(5, 1fr); } }
@media (min-width: 1100px) { .grid { grid-template-columns: repeat(6, 1fr); } }

/* Card */
.card { background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: var(--card-radius); overflow: hidden; box-shadow: 0 4px 20px var(--glass-shadow); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
.card:active { transform: scale(0.97); }
@media (hover: hover) { .card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px var(--glass-shadow); } }
.poster-wrap { position: relative; padding-top: 150%; background: rgba(255,255,255,0.3); }
.poster-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.poster-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 40px; }
.score-badge { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.9); border-radius: 8px; padding: 3px 7px; font-size: 11px; font-weight: 700; }
.status-dot { position: absolute; top: 8px; left: 8px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; background: rgba(255,255,255,0.9); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.card-body { padding: 10px; }
.card-title { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-seasons { font-size: 10px; color: var(--text-muted); }
.provider-tags { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 5px; }
.provider-tag { border-radius: 5px; padding: 2px 5px; font-size: 8px; color: #fff; font-weight: 800; }
.star { color: #f5a623; font-size: 10px; }
.card-year { font-size: 10px; color: var(--text-muted); }

/* Detail modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(20,30,60,0.4); backdrop-filter: blur(8px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
@media (min-width: 600px) { .modal-overlay { align-items: center; } }
.modal { background: linear-gradient(160deg, #f0f5ff, #e8eef7); border-radius: 28px 28px 0 0; width: 100%; max-width: 560px; max-height: 88vh; overflow-y: auto; padding: 24px; box-shadow: 0 -8px 40px rgba(0,0,0,0.2); }
@media (min-width: 600px) { .modal { border-radius: 28px; max-height: 80vh; } }
.modal-handle { width: 40px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 0 auto 20px; }
.modal-poster-row { display: flex; gap: 16px; margin-bottom: 20px; }
.modal-poster { width: 90px; flex-shrink: 0; border-radius: 14px; overflow: hidden; }
.modal-poster img { width: 100%; display: block; }
.modal-info { flex: 1; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.modal-overview { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px; }
.modal-status-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.modal-status-btn { padding: 8px 16px; border-radius: var(--pill-radius); border: 2px solid transparent; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; background: rgba(255,255,255,0.6); color: var(--text-muted); }
.modal-status-btn.active { color: #fff; }
.seasons-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; }
.season-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: rgba(255,255,255,0.6); border-radius: 12px; margin-bottom: 8px; }
.season-label { font-size: 13px; font-weight: 600; }
.season-btns { display: flex; gap: 6px; }
.season-btn { padding: 5px 12px; border-radius: var(--pill-radius); border: 1.5px solid transparent; font-size: 11px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.6); color: var(--text-muted); }
.season-btn.active { color: #fff; }

/* Chat button */
.chat-fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 22px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(91,110,245,0.4); z-index: 300; display: flex; align-items: center; justify-content: center; }

/* Chat panel */
.chat-overlay { position: fixed; inset: 0; z-index: 400; display: flex; align-items: flex-end; justify-content: center; background: rgba(20,30,60,0.3); backdrop-filter: blur(6px); }
.chat-panel { background: linear-gradient(160deg, #f0f5ff, #e8eef7); border-radius: 28px 28px 0 0; width: 100%; max-width: 560px; height: 70vh; display: flex; flex-direction: column; padding: 16px; box-shadow: 0 -8px 40px rgba(0,0,0,0.15); }
.chat-handle { width: 40px; height: 4px; background: rgba(0,0,0,0.15); border-radius: 2px; margin: 0 auto 14px; }
.chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-bottom: 8px; }
.msg { display: flex; }
.msg.user { justify-content: flex-end; }
.msg-bubble { max-width: 85%; border-radius: 18px; padding: 10px 14px; font-size: 14px; line-height: 1.5; }
.msg.user .msg-bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant .msg-bubble { background: rgba(255,255,255,0.8); color: var(--text); border-bottom-left-radius: 4px; }
.chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
.chat-input { flex: 1; padding: 12px 16px; border-radius: var(--pill-radius); border: 1.5px solid rgba(255,255,255,0.8); background: rgba(255,255,255,0.8); font-size: 15px; color: var(--text); outline: none; }
.chat-send { background: var(--accent); border: none; border-radius: 50%; width: 44px; height: 44px; color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0; }

/* Loader */
.loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
.spinner { width: 36px; height: 36px; border: 3px solid rgba(91,110,245,0.2); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-msg { font-size: 13px; color: var(--text-muted); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>

<!-- Chat Panel -->
<div class="chat-overlay" id="chat-overlay" style="display:none" onclick="if(event.target===this)toggleChat()">

    </div>

      <button class="chat-send" onclick="sendChat()">↑</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

    headers: { Authorization: "Bearer " + TMDB_TOKEN }
  });
  if (!r.ok) throw new Error("TMDB " + r.status);
  return r.json();
}

async function loadBrowse() {
  setLoading("Lade Top-Titel...");
  try {
    const pid = currentProvider || 8;
    const [tvData, movieData] = await Promise.all([
      tmdb("/discover/tv?with_watch_providers=" + pid + "&watch_region=DE&sort_by=vote_average.desc&vote_count.gte=100&page=1"),
      tmdb("/discover/movie?with_watch_providers=" + pid + "&watch_region=DE&sort_by=vote_average.desc&vote_count.gte=200&page=1")
    ]);
    const tvItems = (tvData.results || []).slice(0, 20).map(i => ({ ...i, mediaType: "series", title: i.name }));
    const movieItems = (movieData.results || []).slice(0, 20).map(i => ({ ...i, mediaType: "movie" }));
    allItems = [...tvItems, ...movieItems];
    renderBrowse(tvItems, movieItems);
  } catch(e) {
    setError("Fehler beim Laden: " + e.message);
  }
}

function renderBrowse(tvItems, movieItems) {
  const pname = currentProvider ? PROVIDERS[currentProvider].name : "Allen Anbietern";
  let html = '<div class="section-header">Top Serien auf ' + pname + '</div>';
  html += '<div class="grid">' + tvItems.map(item => cardHTML(item)).join("") + '</div>';
  html += '<div class="section-header" style="margin-top:24px">Top Filme auf ' + pname + '</div>';
  html += '<div class="grid">' + movieItems.map(item => cardHTML(item)).join("") + '</div>';
  document.getElementById("main-content").innerHTML = html;
}

function cardHTML(item) {
  const key = item.mediaType + "-" + item.id;
  const status = userStatuses[key] || "none";
  const pct = Math.round((item.vote_average || 0) * 10);
  const scoreColor = pct >= 75 ? "#22c55e" : pct >= 50 ? "#f5a623" : "#ef4444";
  const title = item.title || item.name || "";
  const year = (item.release_date || item.first_air_date || "").slice(0,4);
  const seasons = item.number_of_seasons ? item.number_of_seasons + " Staffel" + (item.number_of_seasons > 1 ? "n" : "") : "";
  const statusIcon = status !== "none" ? STATUS_CONFIG[status].icon : "";
  const poster = item.poster_path
    ? '<img src="https://image.tmdb.org/t/p/w300' + item.poster_path + '" alt="" loading="lazy">'
    : '<div class="poster-placeholder">🎬</div>';

  const storeKey = key + "-" + Date.now() + Math.random();
  itemStore[storeKey] = item;
  return '<div class="card" onclick="openModal(\'  + storeKey + '\)">'+
    '<div class="poster-wrap">' + poster +
      '<div class="score-badge" style="color:' + scoreColor + '">★ ' + (item.vote_average || 0).toFixed(1) + '</div>' +
      (statusIcon ? '<div class="status-dot">' + statusIcon + '</div>' : '') +
    '</div>' +
    '<div class="card-body">' +
      '<div class="card-title">' + title + '</div>' +
      '<div class="card-meta">' +
        (year ? '<span class="card-year">' + year + '</span>' : '') +
        (seasons ? '<span class="card-seasons">' + seasons + '</span>' : '') +
      '</div>' +
    '</div>' +
  '</div>';
}

async function loadMyList(status) {
  setLoading("Lade deine Liste...");
  const { data } = await sb.from("watch_status")
    .select("*, titles(*)")
    .eq("user_id", currentUser.id)
    .eq("status", status);

  if (!data || data.length === 0) {
    const labels = { want: "Noch nichts auf der Watchlist", watching: "Keine angefangenen Titel", aborted: "Keine abgebrochenen Titel", done: "Noch nichts als gesehen markiert" };
    document.getElementById("main-content").innerHTML = '<div class="empty-state"><div class="empty-icon">' + (STATUS_CONFIG[status] ? STATUS_CONFIG[status].icon : "📋") + '</div>' + (labels[status] || "") + '</div>';
    return;
  }

  const items = data.map(r => ({ ...r.titles, mediaType: r.titles ? r.titles.media_type : "series" })).filter(i => i.id);
  const label = STATUS_CONFIG[status] ? STATUS_CONFIG[status].label : status;
  let html = '<div class="section-header">' + label + ' (' + items.length + ')</div>';
  html += '<div class="grid">' + items.map(item => cardHTML(item)).join("") + '</div>';
  document.getElementById("main-content").innerHTML = html;
}

async function openModal(storeKey) {
  const item = itemStore[storeKey];
  if (!item) return;
  const key = item.mediaType + "-" + item.id;

  // Fetch seasons if series
  let seasons = [];
  if (item.mediaType === "series" && item.id) {
    try {
      const d = await tmdb("/" + (item.mediaType === "series" ? "tv" : "movie") + "/" + item.id);
      seasons = d.seasons ? d.seasons.filter(s => s.season_number > 0) : [];
      item.number_of_seasons = d.number_of_seasons;
      item.overview = d.overview || item.overview;
    } catch {}
  }

  const status = userStatuses[key] || "none";
  const title = item.title || item.name || "";
  const poster = item.poster_path ? '<img src="https://image.tmdb.org/t/p/w300' + item.poster_path + '" alt="">' : '<div style="height:130px;background:rgba(0,0,0,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:32px">🎬</div>';

  const statusBtns = Object.entries(STATUS_CONFIG).map(([s, cfg]) => {
    const active = status === s;
    return '<button class="modal-status-btn' + (active ? " active" : "") + '" style="' + (active ? "background:" + cfg.color + ";border-color:" + cfg.color : "") + '" onclick="setStatus(\'' + key + '\',\'' + s + '\',\'' + item.mediaType + '\',' + item.id + ')">' + cfg.icon + ' ' + cfg.label + '</button>';
  }).join("");

  let seasonHtml = "";
  if (seasons.length > 0) {
    seasonHtml = '<div class="seasons-title">Staffeln</div>';
    seasons.forEach(s => {
      const ss = (seasonStatuses[key] && seasonStatuses[key][s.season_number]) || "none";
      seasonHtml += '<div class="season-row">' +
        '<div class="season-label">Staffel ' + s.season_number + (s.episode_count ? ' <span style="color:var(--text-muted);font-weight:400;font-size:11px">(' + s.episode_count + ' Eps.)</span>' : '') + '</div>' +
        '<div class="season-btns">' +
          Object.entries(STATUS_CONFIG).map(([sv, cfg]) =>
            '<button class="season-btn' + (ss === sv ? " active" : "") + '" style="' + (ss === sv ? "background:" + cfg.color + ";border-color:" + cfg.color : "") + '" onclick="setSeasonStatus(\'' + key + '\',' + s.season_number + ',\'' + sv + '\')">' + cfg.icon + '</button>'
          ).join("") +
        '</div>' +
      '</div>';
    });
  }

  document.getElementById("modal-content").innerHTML =
    '<div class="modal-handle"></div>' +
    '<div class="modal-poster-row">' +
      '<div class="modal-poster">' + poster + '</div>' +
      '<div class="modal-info"><div class="modal-title">' + title + '</div>' +
        (item.overview ? '<div class="modal-overview">' + item.overview.slice(0,200) + (item.overview.length > 200 ? '...' : '') + '</div>' : '') +
      '</div>' +
    '</div>' +
    '<div class="modal-status-btns">' + statusBtns + '</div>' +
    seasonHtml;

  document.getElementById("modal-overlay").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal-overlay").style.display = "none";
}

async function setStatus(key, status, mediaType, tmdbId) {
  userStatuses[key] = status;
  // Upsert in supabase titles + watch_status
  const parts = key.split("-");
  const titleId = key;

  // First ensure title exists
  await sb.from("titles").upsert({ id: titleId, tmdb_id: tmdbId, media_type: mediaType, title: key }, { onConflict: "id" });
  await sb.from("watch_status").upsert({ title_id: titleId, user_id: currentUser.id, status, updated_at: new Date().toISOString() }, { onConflict: "title_id,user_id" });

  // Re-render modal status buttons
  document.querySelectorAll(".modal-status-btn").forEach(btn => {
    const s = btn.getAttribute("onclick").match(/'([^']+)','([^']+)'/)[2];
    const cfg = STATUS_CONFIG[s];
    const active = s === status;
    btn.className = "modal-status-btn" + (active ? " active" : "");
    btn.style.cssText = active ? "background:" + cfg.color + ";border-color:" + cfg.color + ";color:#fff" : "";
  });

  // Update card in grid
  document.querySelectorAll(".card").forEach(card => {
    if (card.getAttribute("onclick") && card.getAttribute("onclick").includes('"id":' + tmdbId)) {
      const dot = card.querySelector(".status-dot");
      if (status !== "none") {
        if (dot) dot.innerHTML = STATUS_CONFIG[status].icon;
        else {
          const pw = card.querySelector(".poster-wrap");
          const d = document.createElement("div");
          d.className = "status-dot";
          d.innerHTML = STATUS_CONFIG[status].icon;
          pw.appendChild(d);
        }
      } else if (dot) dot.remove();
    }
  });
}

async function setSeasonStatus(titleId, seasonNum, status) {
  if (!seasonStatuses[titleId]) seasonStatuses[titleId] = {};
  seasonStatuses[titleId][seasonNum] = status;
  await sb.from("season_status").upsert({ title_id: titleId, user_id: currentUser.id, season_number: seasonNum, status, updated_at: new Date().toISOString() }, { onConflict: "title_id,user_id,season_number" });

  // Update button in modal
  document.querySelectorAll(".season-row").forEach(row => {
    if (row.querySelector(".season-label") && row.querySelector(".season-label").textContent.includes("Staffel " + seasonNum)) {
      row.querySelectorAll(".season-btn").forEach(btn => {
        const sv = btn.getAttribute("onclick").match(/'([^']+)'\)$/)[1];
        const cfg = STATUS_CONFIG[sv];
        const active = sv === status;
        btn.className = "season-btn" + (active ? " active" : "");
        btn.style.cssText = active ? "background:" + cfg.color + ";border-color:" + cfg.color + ";color:#fff" : "";
      });
    }
  });
}

function toggleSearch() {
  showSearch = !showSearch;
  document.getElementById("search-bar").style.display = showSearch ? "block" : "none";
  if (showSearch) document.getElementById("search-input").focus();
}

function onSearch(val) {
  clearTimeout(searchTimeout);
  if (!val.trim()) { switchTab(currentTab); return; }
  searchTimeout = setTimeout(() => searchTMDB(val), 500);
}

async function searchTMDB(query) {
  setLoading("Suche...");
  try {
    const data = await tmdb("/search/multi?query=" + encodeURIComponent(query) + "&page=1");
    const results = (data.results || []).filter(r => r.media_type === "tv" || r.media_type === "movie").map(r => ({
      ...r, mediaType: r.media_type === "tv" ? "series" : "movie", title: r.name || r.title
    }));
    if (results.length === 0) {
      document.getElementById("main-content").innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div>Keine Ergebnisse fuer "' + query + '"</div>';
      return;
    }
    let html = '<div class="section-header">Suchergebnisse</div><div class="grid">' + results.map(item => cardHTML(item)).join("") + '</div>';
    document.getElementById("main-content").innerHTML = html;
  } catch(e) { setError("Suchfehler: " + e.message); }
}

function toggleChat() {
  showChat = !showChat;
  document.getElementById("chat-overlay").style.display = showChat ? "flex" : "none";
}

function addChatMsg(role, text) {
  const box = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = '<div class="msg-bubble">' + text + '</div>';
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById("chat-input");
  const msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  addChatMsg("user", msg);
  chatHistory.push({ role: "user", content: msg });

  const thinking = document.createElement("div");
  thinking.className = "msg assistant";
  thinking.innerHTML = '<div class="msg-bubble">...</div>';
  document.getElementById("chat-messages").appendChild(thinking);

  const summary = Object.entries(userStatuses).slice(0,50).map(([id, s]) => id + ":" + s).join(", ");
  const system = "Du bist Assistent fuer ein Streaming-Dashboard. Status-Werte: want, watching, aborted, done. Wenn Status geaendert: <status_update>{\"id\":\"series-123\",\"status\":\"done\"}</status_update>. Aktuelle Status: " + summary + ". Antworte auf Deutsch, kurz.";

  try {
    const res = await fetch(CLAUDE_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 600, system, messages: chatHistory })
    });
    const data = await res.json();
    const fullText = (data.content && data.content[0] && data.content[0].text) || "Keine Antwort.";
    const regex = /<status_update>([\s\S]*?)<\/status_update>/g;
    let match;
    while ((match = regex.exec(fullText)) !== null) {
      try {
        const u = JSON.parse(match[1].trim());
        if (u.id && u.status) {
          const parts = u.id.split("-");
          const tmdbId = parseInt(parts[parts.length-1]);
          const mType = u.id.startsWith("movie") ? "movie" : "series";
          await setStatus(u.id, u.status, mType, tmdbId);
        }
      } catch {}
    }
    const clean = fullText.replace(/<status_update>[\s\S]*?<\/status_update>/g, "").trim();
    chatHistory.push({ role: "assistant", content: clean });
    thinking.remove();
    addChatMsg("assistant", clean);
  } catch(e) {
    thinking.remove();
    addChatMsg("assistant", "Verbindungsfehler.");
  }
}

function setLoading(msg) {
  document.getElementById("main-content").innerHTML = '<div class="loader"><div class="spinner"></div><div class="loader-msg">' + msg + '</div></div>';
}

function setError(msg) {
  document.getElementById("main-content").innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div>' + msg + '<br><br><button onclick="switchTab(currentTab)" style="padding:10px 20px;background:var(--accent);color:#fff;border:none;border-radius:20px;cursor:pointer;font-size:14px">Erneut versuchen</button></div>';
}

init();
</script>
