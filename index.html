<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>JustWatch Test</title></head>
<body style="font-family:sans-serif;padding:24px;background:#f0f4f8">
<h2>JustWatch Provider Test</h2>
<button onclick="runTest()" style="padding:12px 24px;background:#22c55e;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer">Test starten</button>
<pre id="result" style="margin-top:24px;background:#fff;padding:20px;border-radius:8px;font-size:14px"></pre>
<script>
async function runTest() {
  document.getElementById("result").textContent = "Teste...";
  try {
    const res = await fetch("/.netlify/functions/test-providers");
    const data = await res.json();
    document.getElementById("result").textContent = JSON.stringify(data, null, 2);
  } catch(e) {
    document.getElementById("result").textContent = "Fehler: " + e.message;
  }
}
</script>
</body>
</html>
