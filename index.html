<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StreamBoard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d1117;
  --surface: #161c27;
  --surface2: #1e2737;
  --border: rgba(255,255,255,0.07);
  --text: #e2e8f0;
  --text-muted: #64748b;
  --accent: #0ea5e9;
  --accent2: #0284c7;
  --want: #a855f7;
  --watching: #f59e0b;
  --aborted: #ef4444;
  --done: #22c55e;
  --radius: 4px;
  --pill: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif; min-height: 100vh; overflow-x: hidden; }

/* Header */
header { position: sticky; top: 0; z-index: 200; background: rgba(13,17,23,0.95); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); padding: 14px 20px; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.logo-icon svg { width: 18px; height: 18px; }
.logo-text { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); }
.logo-text span { color: var(--accent); font-weight: 700; }
.header-actions { display: flex; gap: 8px; }
.icon-btn { background: transparent; border: none; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 18px; transition: all 0.2s; }
.icon-btn:hover { opacity: 0.7; }

/* Status tabs */
.status-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; justify-content: center; -webkit-overflow-scrolling: touch; padding: 0 4px; }
.status-tabs::-webkit-scrollbar { display: none; }
.stab { flex-shrink: 0; padding: 10px 18px; border-radius: var(--pill); border: 1px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-muted); white-space: nowrap; transition: all 0.2s; touch-action: manipulation; min-height: 44px; display: flex; align-items: center; }
.stab:hover { color: var(--text); border-color: var(--accent); }
.stab.active { background: var(--accent); color: #fff; font-weight: 600; border-color: transparent; }

/* Provider & Type bars */
.sub-bar { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 10px 20px 8px; justify-content: center; -webkit-overflow-scrolling: touch; }
.sub-bar::-webkit-scrollbar { display: none; }
.ppill { flex-shrink: 0; padding: 8px 16px; border-radius: var(--pill); border: 1px solid var(--border); background: transparent; font-size: 12px; font-weight: 600; cursor: pointer; color: var(--text-muted); transition: all 0.2s; white-space: nowrap; touch-action: manipulation; min-height: 44px; display: flex; align-items: center; justify-content: center; }
.ppill:hover { color: var(--text); border-color: var(--accent); }
.ppill.active { background: var(--accent); color: #fff; border-color: transparent; }
.typebtn { padding: 5px 14px; border-radius: var(--pill); border: 1px solid var(--border); background: transparent; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
.typebtn.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }

/* Sort bar */
.sort-bar { display: flex; align-items: center; gap: 8px; padding: 6px 20px 10px; }
.sort-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
.sort-select { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 5px 10px; color: var(--text); font-size: 12px; cursor: pointer; outline: none; }
.sort-select:focus { border-color: var(--accent); }

/* Search */
.search-wrap { position: fixed; top: 0; left: 0; right: 0; z-index: 300; padding: 12px 20px; background: rgba(13,17,23,0.97); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.15); }
.search-icon { position: absolute; left: 28px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); font-size: 16px; pointer-events: none; display: flex; align-items: center; }
.search-input { width: 100%; padding: 10px 16px 10px 54px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.07); font-size: 14px; color: #fff; outline: none; transition: border-color 0.2s; -webkit-appearance: none; appearance: none; box-shadow: none; }
.search-input:focus { border-color: rgba(255,255,255,0.6); }
.search-input::placeholder { color: var(--text-muted); }

/* Main */
main { padding: 16px 20px 100px; }
.section-title { font-size: 20px; font-weight: 700; margin: 16px 0 12px; letter-spacing: -0.3px; }

/* Grid */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
@media (min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); gap: 12px; } }
@media (min-width: 680px) { .grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 900px) { .grid { grid-template-columns: repeat(5, 1fr); } }
@media (min-width: 1100px) { .grid { grid-template-columns: repeat(6, 1fr); } }
@media (min-width: 1400px) { .grid { grid-template-columns: repeat(7, 1fr); } }

/* Card */
.card { position: relative; border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s; background: var(--surface); aspect-ratio: 2/3; border: 1px solid var(--border); }
.card:active { transform: scale(0.97); }
@media (hover: hover) { .card:hover { transform: translateY(-3px); border-color: var(--accent); } }
.card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.card-placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; background: var(--surface2); }
.card-gradient { position: absolute; bottom: 0; left: 0; right: 0; height: 60%; background: linear-gradient(to top, rgba(13,17,23,0.95) 0%, transparent 100%); }
.card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; }
.card-title { font-size: 12px; font-weight: 600; color: #fff; line-height: 1.3; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.card-score { font-size: 10px; font-weight: 700; color: #f59e0b; }
.card-seasons { font-size: 10px; color: rgba(255,255,255,0.5); }
.card-channel-hint { border-left: 2px solid #f59e0b; background: rgba(245,158,11,0.15); padding: 2px 5px; margin-top: 3px; font-size: 8px; color: #f59e0b; font-weight: 600; }
.card-badges { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; flex-wrap: wrap; max-width: 80%; }
.card-badge { border-radius: 2px; padding: 2px 6px; font-size: 8px; color: #fff; font-weight: 800; }
.status-badge { position: absolute; bottom: 42px; right: 8px; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 2px; color: #000; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; }
@media (min-width: 600px) { .modal-overlay { align-items: center; } }
.modal { background: var(--surface); border-radius: 4px 4px 0 0; width: 100%; max-width: 580px; max-height: 90vh; overflow-y: auto; padding: 20px; border: 1px solid var(--border); position: relative; }
@media (min-width: 600px) { .modal { border-radius: 4px; } }
.modal-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 0 auto 18px; }
.modal-row { display: flex; gap: 16px; margin-bottom: 18px; }
.modal-poster { width: 90px; flex-shrink: 0; border-radius: 4px; overflow: hidden; }
.modal-poster img { width: 100%; display: block; }
.modal-poster-placeholder { width: 90px; height: 135px; background: var(--surface2); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
.modal-info { flex: 1; min-width: 0; }
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
.modal-close { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.modal-close:hover { border-color: var(--accent); color: var(--accent); }
.modal-scores { display: flex; gap: 10px; margin-bottom: 6px; align-items: center; }
.modal-score-item { font-size: 12px; }
.modal-score-label { color: var(--text-muted); font-size: 10px; }
.modal-genres { font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.modal-overview { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.status-btns { display: flex; gap: 6px; flex-wrap: nowrap; margin-bottom: 20px; margin-top: 4px; overflow-x: auto; padding-bottom: 2px; }
.sbtn { padding: 7px 14px; border-radius: var(--pill); border: 1px solid var(--border); font-size: 12px; font-weight: 500; cursor: pointer; background: var(--surface2); color: var(--text-muted); transition: all 0.15s; }
.sbtn:hover { color: var(--text); border-color: var(--accent); }
.sbtn.active { color: #fff; border-color: transparent; font-weight: 600; }
.seasons-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
.season-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 6px; border: 1px solid var(--border); }
.season-label { font-size: 13px; font-weight: 500; }
.season-eps { font-size: 11px; color: var(--text-muted); margin-left: 6px; }
.season-btns { display: flex; gap: 5px; }
.season-btn { padding: 5px 14px; border-radius: var(--pill); border: 1px solid var(--border); font-size: 11px; font-weight: 500; cursor: pointer; background: transparent; color: var(--text-muted); transition: all 0.15s; }
.season-btn.active { background: #22c55e; color: #000; border-color: transparent; font-weight: 700; }
.new-season-badge { display: inline-block; background: #f59e0b; color: #000; font-size: 8px; font-weight: 800; padding: 2px 6px; border-radius: 2px; vertical-align: middle; margin-left: 6px; }
.new-season-hint { background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 14px; font-size: 13px; color: #f59e0b; display: flex; align-items: center; gap: 8px; }

/* Chat */
.chat-fab { position: fixed; bottom: 22px; right: 20px; width: 52px; height: 52px; border-radius: 50%; background: #fff; color: #000; font-size: 20px; border: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.4); z-index: 300; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
.chat-fab:hover { transform: scale(1.05); }
.chat-overlay { position: fixed; inset: 0; z-index: 400; display: none; align-items: flex-end; justify-content: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); }
.chat-panel { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 560px; height: 68vh; display: flex; flex-direction: column; padding: 14px; border: 1px solid var(--border); border-bottom: none; }
.chat-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 12px; }
.chat-msgs { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.msg { display: flex; }
.msg.user { justify-content: flex-end; }
.bubble { max-width: 85%; border-radius: 16px; padding: 9px 13px; font-size: 14px; line-height: 1.5; }
.msg.user .bubble { background: #fff; color: #000; border-bottom-right-radius: 4px; }
.msg.assistant .bubble { background: var(--surface2); color: var(--text); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
.chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
.chat-input { flex: 1; padding: 11px 15px; border-radius: var(--pill); border: 1px solid var(--border); background: var(--surface2); font-size: 15px; color: var(--text); outline: none; }
.chat-input::placeholder { color: var(--text-muted); }
.chat-input:focus { border-color: rgba(255,255,255,0.3); }
.chat-send { background: #fff; border: none; border-radius: 50%; width: 42px; height: 42px; color: #000; font-size: 18px; cursor: pointer; flex-shrink: 0; transition: opacity 0.2s; }
.chat-send:disabled { opacity: 0.4; }

/* Loader */
.loader { display: flex; flex-direction: column; align-items: center; padding: 80px 20px; gap: 14px; }
.spinner { width: 32px; height: 32px; border: 2px solid rgba(255,255,255,0.1); border-top: 2px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader-msg { font-size: 13px; color: var(--text-muted); }
.empty { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-icon { font-size: 44px; margin-bottom: 10px; opacity: 0.4; }
</style>
</head>

        }
      }
      return "<span class=\"card-badge\" style=\"background:" + color + "\">" + displayName + "</span>";
    }).filter(Boolean).slice(0, 2);
    // Wenn im Browse-Tab keine direkten Badges aber Channel-Hinweise vorhanden → aktuellen Provider-Badge erzwingen
    if (currentTab === "browse" && badgeList.length === 0 && channelNames.length > 0) {
      var curProv = PROVIDERS.find(function(x) { return x.slug === currentSlug; });
      if (curProv) badgeList.push("<span class=\"card-badge\" style=\"background:" + curProv.color + "\">" + curProv.name + "</span>");
    }
    badges = badgeList.join("");
    if (channelNames.length > 0) {
      channelHint = "<div class=\"card-channel-hint\">+ " + channelNames.slice(0,2).join(", ") + " nötig</div>";
    }
  }

  // "Neue Staffel" Badge: newSeasonIds[key] gesetzt = neue Staffel verfügbar
  var newSeasonBadge = "";
  if (item.type === "series" && newSeasonIds[key]) {
    newSeasonBadge = "<span class=\"card-badge\" style=\"background:#ff9f0a;color:#000;font-weight:800\">NEU</span>";
  }

  var html = "<div class=\"card\" data-sk=\"" + sk + "\">";
  html += poster;
  html += "<div class=\"card-gradient\"></div>";
  if (badges || newSeasonBadge) html += "<div class=\"card-badges\">" + badges + newSeasonBadge + "</div>";
  if (statusCfg) html += "<div class=\"status-badge\" style=\"background:" + statusCfg.color + ";color:#000\">" + statusCfg.label + "</div>";
  html += "<div class=\"card-body\">";
  html += "<div class=\"card-title\">" + (item.title || "") + "</div>";
  html += "<div class=\"card-meta\">";
  if (score) html += "<span class=\"card-score\" style=\"color:" + scoreColor(score) + "\">&#9733; " + score.toFixed(1) + "</span>";
  if (seasons) html += "<span class=\"card-seasons\">" + seasons + "</span>";
  html += "</div>";
  if (channelHint) html += channelHint;
  html += "</div></div>";
  return html;
}

function attachCards() {
  document.querySelectorAll(".card").forEach(function(card) {
    card.addEventListener("click", function() {
      var item = itemStore[this.getAttribute("data-sk")];
      if (item) openModal(item);
    });
  });
}

function renderProviderBar() {
  var bar = document.getElementById("provider-bar");
  bar.innerHTML = PROVIDERS.map(function(p) {
    var active = p.slug === currentSlug;
    var inner = p.logo
      ? "<img src=\"" + p.logo + "\" alt=\"" + p.name + "\" style=\"height:22px;width:auto;max-width:70px;object-fit:contain;filter:brightness(0) invert(1);\" onerror=\"this.style.display='none';this.nextSibling.style.display='block'\"><span style=\"display:none\">" + p.name + "</span>"
      : p.name;
    return "<div class=\"ppill\" data-slug=\"" + p.slug + "\" style=\"background:" + (active ? p.color : "var(--surface2)") + ";border-color:" + (active ? p.color : "var(--border)") + ";padding:8px 14px;min-width:64px;display:flex;align-items:center;justify-content:center;\">" + inner + "</div>";
  }).join("");
  bar.querySelectorAll(".ppill").forEach(function(pill) {
    pill.addEventListener("click", function() {
      currentSlug = this.getAttribute("data-slug");
      renderProviderBar();
      if (currentTab === "browse") loadBrowse();
    });
  });
}

function applySort(items) {
  var sorted = items.slice();
  if (currentSort === "score") sorted.sort(function(a,b) { return (b.imdbScore||b.tmdbScore||0) - (a.imdbScore||a.tmdbScore||0); });
  else if (currentSort === "title") sorted.sort(function(a,b) { return (a.title||"").localeCompare(b.title||""); });
  else if (currentSort === "year") sorted.sort(function(a,b) { return (b.year||0) - (a.year||0); });
  return sorted;
}

function loadBrowse() {
  setLoading("Lade...");
  fetch(API + "?action=popular&slug=" + currentSlug + "&type=" + currentType).then(function(r) { return r.json(); }).then(function(data) {
    var all = applySort(data.items || []);
    var items = all.filter(function(item) {
      var key = item.type + "-" + item.id;
      return !userStatuses[key];
    });
    var prov = PROVIDERS.find(function(p) { return p.slug === currentSlug; });
    var html = "<div class=\"section-title\">Top auf " + (prov ? prov.name : "") + " <span style=\"color:var(--text-muted);font-size:14px;font-weight:400\">(" + items.length + ")</span></div>";
    html += "<div class=\"grid\">" + items.map(cardHTML).join("") + "</div>";
    document.getElementById("main").innerHTML = html;
    attachCards();
  }).catch(function(e) { setEmpty("&#9888;", "Fehler: " + e.message); });
}

function loadMyList(status) {
  setLoading("Lade...");
  var query = sb.from("watch_status").select("*, titles(*)").eq("status", status);
  if (currentSort === "updated") query = query.order("updated_at", {ascending: false});
  query.then(function(r) {
    var data = r.data || [];
    if (!data.length) { setEmpty("&#8212;", STATUS[status].label + " ist leer"); return; }
    var items = data.filter(function(r) { return r.titles; }).map(function(r) {
      var t = r.titles;
      return {
        id: t.tmdb_id || r.title_id.replace(/^(series|movie)-/, ""),
        supabase_id: r.title_id,
        type: t.media_type || "series",
        title: t.title || "",
        poster: t.poster_path || null,
        overview: t.overview || "",
        imdbScore: t.vote_average || null,
        tmdbScore: null,
        year: t.year || null,
        genres: [],
        providers: [],
        seasons: [],
        updated_at: r.updated_at
      };
    });
    if (currentSort === "score") items = applySort(items);
    else if (currentSort === "title") items = applySort(items);
    else if (currentSort === "year") items = applySort(items);
    var html = "<div class=\"section-title\">" + STATUS[status].label + " <span style=\"color:var(--text-muted);font-size:14px;font-weight:400\">(" + items.length + ")</span></div>";
    html += "<div class=\"grid\">" + items.map(cardHTML).join("") + "</div>";
    document.getElementById("main").innerHTML = html;
    attachCards();
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".stab").forEach(function(t) {
    var active = t.getAttribute("data-tab") === tab;
    t.className = "stab" + (active ? " active" : "");
    t.style.background = active ? TAB_COLORS[tab] : "";
    t.style.color = active ? (tab === "browse" ? "#000" : "#000") : "";
    t.style.borderColor = active ? "transparent" : "";
  });
  var isBrowse = tab === "browse";
  document.getElementById("provider-bar").style.display = isBrowse ? "flex" : "none";
  document.getElementById("type-bar").style.display = isBrowse ? "flex" : "none";
  document.getElementById("sort-bar").style.display = "flex";
  if (isBrowse) loadBrowse();
  else loadMyList(tab);
}

function openModal(item) {
  var key = item.supabase_id || (item.type + "-" + item.id);
  var status = userStatuses[key] || "none";
  var score = item.imdbScore || item.tmdbScore;
  var tmdbScore = item.tmdbScore;
  var poster = item.poster
    ? "<img src=\"" + item.poster + "\" alt=\"\">"
    : null;

  var statusBtns = Object.keys(STATUS).map(function(s) {
    var cfg = STATUS[s];
    var active = status === s;
    return "<button class=\"sbtn" + (active ? " active" : "") + "\" data-s=\"" + s + "\" style=\"" + (active ? "background:" + cfg.color + ";border-color:transparent" : "") + "\">" + cfg.label + "</button>";
  }).join("");

  var scores = "";
  if (score) scores += "<div class=\"modal-score-item\"><div class=\"modal-score-label\">IMDb</div><div style=\"color:#ffd60a;font-weight:700\">&#9733; " + score.toFixed(1) + "</div></div>";
  if (tmdbScore && tmdbScore !== score) scores += "<div class=\"modal-score-item\"><div class=\"modal-score-label\">Publikum</div><div style=\"color:#32d74b;font-weight:700\">" + Math.round(tmdbScore * 10) + "%</div></div>";

  var html = "<div class=\"modal-handle\"></div>";
  html += "<div class=\"modal-row\">";
  html += poster ? "<div class=\"modal-poster\">" + poster + "</div>" : "<div class=\"modal-poster-placeholder\">&#127916;</div>";
  html += "<div class=\"modal-info\">";
  html += "<button class=\"modal-close\" onclick=\"document.getElementById('modal-overlay').style.display='none'\">&#10005;</button>";
  html += "<div class=\"modal-title\">" + (item.title || "") + "</div>";
  if (scores) html += "<div class=\"modal-scores\">" + scores + "</div>";
  if (item.genres && item.genres.length) html += "<div class=\"modal-genres\">" + item.genres.join(" &bull; ") + "</div>";
  html += "</div></div>";
  html += "<div class=\"status-btns\">" + statusBtns + "</div>";
  if (item.overview) html += "<p style=\"font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:18px\">" + item.overview.slice(0,500) + (item.overview.length > 500 ? "..." : "") + "</p>";
  html += "<div id=\"seasons-container\">";
  if (item.seasons && item.seasons.length) {
    html += renderSeasons(item.seasons, key);
  } else if (item.type === "series") {
    html += "<div style=\"color:var(--text-muted);font-size:13px\">Lade Staffeln...</div>";
  }
  html += "</div>";

  document.getElementById("modal").innerHTML = html;
  document.getElementById("modal-overlay").style.display = "flex";

  document.querySelectorAll(".sbtn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var s = this.getAttribute("data-s");
      setStatus(key, s, item);
      document.querySelectorAll(".sbtn").forEach(function(b) {
        var bs = b.getAttribute("data-s");
        var active = bs === s;
        b.className = "sbtn" + (active ? " active" : "");
        b.style.background = active ? STATUS[bs].color : "";
        b.style.borderColor = active ? "transparent" : "";
        b.style.color = active ? "#000" : "";
      });
    });
  });

  if (item.type === "series" && (!item.seasons || !item.seasons.length)) {
    fetch("https://api.themoviedb.org/3/tv/" + (item.tmdb_id || item.id) + "?language=de-DE", {
      headers: { Authorization: "Bearer " + TMDB_TOKEN }
    }).then(function(r) { return r.json(); }).then(function(d) {
      var seasons = (d.seasons || []).filter(function(s) { return s.season_number > 0; }).map(function(s) {
        return { number: s.season_number, episodes: s.episode_count };
      });
      item.seasons = seasons;
      var currentSeasonCount = seasons.length;

      // Feature 4+5: season_count aus Supabase prüfen und ggf. Badge zeigen
      sb.from("titles").select("season_count").eq("id", key).single().then(function(r2) {
        var storedCount = r2.data && r2.data.season_count ? r2.data.season_count : null;
        var sc = document.getElementById("seasons-container");
        if (sc) {
          sc.innerHTML = seasons.length ? renderSeasons(seasons, key) : "";
          attachSeasonBtns();
        }
        if (storedCount !== null && currentSeasonCount > storedCount) {
          // Badge auf Karte setzen
          document.querySelectorAll(".card").forEach(function(c) {
            var sk = c.getAttribute("data-sk");
            if (sk && itemStore[sk] && (itemStore[sk].type + "-" + itemStore[sk].id) === key) {
              var badges = c.querySelector(".card-badges");
              if (badges && !badges.querySelector(".new-s-badge")) {
                var b = document.createElement("span");
                b.className = "card-badge new-s-badge";
                b.style.background = "#ff9f0a";
                b.style.color = "#000";
                b.textContent = "NEU";
                badges.appendChild(b);
              }
            }
          });
          // Hinweis im Modal einblenden
          var hint = document.createElement("div");
          hint.className = "new-season-hint";
          hint.innerHTML = "&#127381; <span><strong>Neue Staffel verfügbar!</strong> Staffel " + currentSeasonCount + " wurde neu hinzugefügt.</span>";
          var statusBtnsEl = document.querySelector(".status-btns");
          if (statusBtnsEl) statusBtnsEl.parentNode.insertBefore(hint, statusBtnsEl);
        }
        // Feature 5: season_count_latest aktualisieren, season_count bleibt bis User bestätigt
        if (storedCount !== currentSeasonCount) {
          sb.from("titles").update({season_count_latest: currentSeasonCount}).eq("id", key);
        }
      }).catch(function() {
        var sc = document.getElementById("seasons-container");
        if (sc) { sc.innerHTML = seasons.length ? renderSeasons(seasons, key) : ""; attachSeasonBtns(); }
        // Auch ohne gespeicherten Wert: season_count erstmalig speichern
        sb.from("titles").update({season_count: currentSeasonCount}).eq("id", key);
      });
    }).catch(function() {
      var sc = document.getElementById("seasons-container");
      if (sc) sc.innerHTML = "";
    });
  } else {
    // Staffeln bereits bekannt → season_count trotzdem prüfen/speichern
    if (item.seasons && item.seasons.length) {
      var currentSeasonCount = item.seasons.length;
      sb.from("titles").select("season_count").eq("id", key).single().then(function(r2) {
        var storedCount = r2.data && r2.data.season_count ? r2.data.season_count : null;
        if (storedCount !== null && currentSeasonCount > storedCount) {
          var hint = document.createElement("div");
          hint.className = "new-season-hint";
          hint.innerHTML = "&#127381; <span><strong>Neue Staffel verfügbar!</strong> Staffel " + currentSeasonCount + " wurde neu hinzugefügt.</span>";
          var statusBtnsEl = document.querySelector(".status-btns");
          if (statusBtnsEl) statusBtnsEl.parentNode.insertBefore(hint, statusBtnsEl);
        }
        if (storedCount !== currentSeasonCount) {
          sb.from("titles").update({season_count: currentSeasonCount}).eq("id", key);
        }
      }).catch(function() {
        sb.from("titles").update({season_count: currentSeasonCount}).eq("id", key);
      });
    }
    attachSeasonBtns();
  }
}

function renderSeasons(seasons, key) {
  var html = "<div class=\"seasons-title\">Staffeln</div>";
  seasons.forEach(function(s) {
    var ss = seasonStatuses[key] && seasonStatuses[key][s.number] ? seasonStatuses[key][s.number] : "none";
    var isDone = ss === "done";
    html += "<div class=\"season-row\">";
    html += "<div><span class=\"season-label\">Staffel " + s.number + "</span>" + (s.episodes ? "<span class=\"season-eps\">(" + s.episodes + " Eps.)</span>" : "") + "</div>";
    html += "<div class=\"season-btns\">";
    html += "<button class=\"season-btn" + (isDone ? " active" : "") + "\" data-sn=\"" + s.number + "\" data-sv=\"" + (isDone ? "done" : "none") + "\">" + (isDone ? "✓ Gesehen" : "Gesehen") + "</button>";
    html += "</div></div>";
  });
  return html;
}

function attachSeasonBtns() {
  var modal = document.getElementById("modal");
  if (!modal) return;
  var key = null;
  document.querySelectorAll(".sbtn").forEach(function(b) {
    if (b.getAttribute("data-s")) {
      var item = itemStore[Object.keys(itemStore).find(function(k) { return itemStore[k].title === document.querySelector(".modal-title") && document.querySelector(".modal-title"); })];
    }
  });
  modal.querySelectorAll(".season-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      var sn = parseInt(this.getAttribute("data-sn"));
      var sv = this.getAttribute("data-sv");
      var titleKey = null;
      document.querySelectorAll(".sbtn").forEach(function(b) {
        if (b.classList.contains("active") || true) {
          var s = b.getAttribute("data-s");
          if (s) {
            var found = Object.keys(itemStore).find(function(k) {
              return itemStore[k].title === (document.querySelector(".modal-title") ? document.querySelector(".modal-title").textContent : "");
            });
            if (found) titleKey = itemStore[found].type + "-" + itemStore[found].id;
          }
        }
      });
      if (!titleKey) {
        var mt = document.querySelector(".modal-title");
        if (mt) {
          Object.keys(itemStore).forEach(function(k) {
            if (itemStore[k].title === mt.textContent) titleKey = itemStore[k].type + "-" + itemStore[k].id;
          });
        }
      }
      // Toggle: done ↔ none
      var currentSv = this.getAttribute("data-sv");
      var newSv = currentSv === "done" ? "none" : "done";
      if (titleKey) setSeasonStatus(titleKey, sn, newSv);
      this.setAttribute("data-sv", newSv);
      var isDone = newSv === "done";
      this.className = "season-btn" + (isDone ? " active" : "");
      this.textContent = isDone ? "✓ Gesehen" : "Gesehen";
      this.style.background = "";
      this.style.color = "";
      this.style.borderColor = "";
    });
  });
}

function setStatus(key, status, item) {
  userStatuses[key] = status;

  // Feature 2: Serie auf "done" → alle Staffeln automatisch auf "done"
  if (status === "done" && item && item.type === "series" && item.seasons && item.seasons.length) {
    item.seasons.forEach(function(s) {
      setSeasonStatus(key, s.number, "done");
    });
    // UI der Staffel-Buttons im offenen Modal aktualisieren (Toggle-Style)
    document.querySelectorAll(".season-btn").forEach(function(btn) {
      btn.setAttribute("data-sv", "done");
      btn.className = "season-btn active";
      btn.textContent = "✓ Gesehen";
      btn.style.background = "";
      btn.style.color = "";
      btn.style.borderColor = "";
    });
  }

  if (currentTab !== "browse") {
    document.querySelectorAll(".card").forEach(function(c) {
      var sk = c.getAttribute("data-sk");
      if (sk && itemStore[sk] && (itemStore[sk].type + "-" + itemStore[sk].id) === key) {
        c.remove();
      }
    });
    var header = document.querySelector(".section-title");
    var grid = document.querySelector(".grid");
    if (header && grid) {
      var count = grid.querySelectorAll(".card").length;
      header.innerHTML = header.innerHTML.replace(/[(][0-9]+[)]/, "(" + count + ")");
    }
  } else {
    // Im Entdecken-Tab: Karte sofort entfernen wenn ein Status gesetzt wird
    document.querySelectorAll(".card").forEach(function(c) {
      var sk = c.getAttribute("data-sk");
      if (sk && itemStore[sk] && (itemStore[sk].type + "-" + itemStore[sk].id) === key) {
        c.remove();
      }
    });
    var header = document.querySelector(".section-title");
    var grid = document.querySelector(".grid");
    if (header && grid) {
      var count = grid.querySelectorAll(".card").length;
      header.innerHTML = header.innerHTML.replace(/[(][0-9]+[)]/, "(" + count + ")");
    }
  }
  var titleData = { id: key, tmdb_id: item.id, media_type: item.type, title: item.title, poster_path: item.poster, vote_average: item.imdbScore || item.tmdbScore || null, overview: item.overview || null };
  console.log("Saving status:", key, status, titleData);
  sb.from("titles").upsert(titleData, {onConflict:"id"}).then(function(r) {
    console.log("titles result:", r.error || "OK");
    // Wenn "done": season_count auf season_count_latest setzen → Badge verschwindet
    if (status === "done" && newSeasonIds[key]) {
      sb.from("titles").update({season_count: newSeasonIds[key]}).eq("id", key);
      delete newSeasonIds[key];
    }
    return sb.from("watch_status").upsert({title_id: key, status: status, updated_at: new Date().toISOString()}, {onConflict:"title_id"});
  }).then(function(r) {
    console.log("watch_status result:", r ? (r.error || "OK") : "no response");
  });
}

function setSeasonStatus(titleId, sn, status) {
  if (!seasonStatuses[titleId]) seasonStatuses[titleId] = {};
  seasonStatuses[titleId][sn] = status;
  sb.from("season_status").upsert({title_id: titleId, season_number: sn, status: status, updated_at: new Date().toISOString()}, {onConflict:"title_id,season_number"});

  // Feature 3: letzte Staffel "done" → Gesamtstatus automatisch "done"
  // Prüft gegen die tatsächliche Staffelzahl aus itemStore, nicht nur gegen bereits gesetzte Einträge
  if (status === "done") {
    var totalSeasons = 0;
    Object.keys(itemStore).forEach(function(k) {
      if (itemStore[k].type + "-" + itemStore[k].id === titleId && itemStore[k].seasons) {
        totalSeasons = itemStore[k].seasons.length;
      }
    });
    var allSeasonNrs = Object.keys(seasonStatuses[titleId]).map(Number);
    var doneSeasonsCount = allSeasonNrs.filter(function(n) { return seasonStatuses[titleId][n] === "done"; }).length;
    if (totalSeasons > 0 && doneSeasonsCount >= totalSeasons) {
        userStatuses[titleId] = "done";
        // Supabase aktualisieren
        sb.from("watch_status").upsert({title_id: titleId, status: "done", updated_at: new Date().toISOString()}, {onConflict:"title_id"});
        // Status-Buttons im Modal aktualisieren
        document.querySelectorAll(".sbtn").forEach(function(b) {
          var bs = b.getAttribute("data-s");
          var active = bs === "done";
          b.className = "sbtn" + (active ? " active" : "");
          b.style.background = active ? STATUS["done"].color : "";
          b.style.borderColor = active ? "transparent" : "";
          b.style.color = active ? "#000" : "";
        });
        // Karte aus Tab entfernen wenn Status gesetzt
        if (currentTab !== "browse") {
          document.querySelectorAll(".card").forEach(function(c) {
            var sk = c.getAttribute("data-sk");
            if (sk && itemStore[sk] && (itemStore[sk].type + "-" + itemStore[sk].id) === titleId) {
              c.remove();
            }
          });
        }
      }
  }
}

function loadStatuses(callback) {
  var pending = 3;
  function done() { pending--; if (pending === 0 && callback) callback(); }
  sb.from("watch_status").select("*").then(function(r) {
    (r.data||[]).forEach(function(row) { userStatuses[row.title_id] = row.status; });
    done();
  });
  sb.from("season_status").select("*").then(function(r) {
    (r.data||[]).forEach(function(row) {
      if (!seasonStatuses[row.title_id]) seasonStatuses[row.title_id] = {};
      seasonStatuses[row.title_id][row.season_number] = row.status;
    });
    done();
  });
  // season_count vs season_count_latest vergleichen für NEU-Badge
  sb.from("titles").select("id,season_count,season_count_latest").eq("media_type","series").then(function(r) {
    (r.data||[]).forEach(function(row) {
      if (row.season_count_latest && row.season_count && row.season_count_latest > row.season_count) {
        newSeasonIds[row.id] = row.season_count_latest;
      }
    });
    done();
  });
}

function addMsg(role, text) {
  var box = document.getElementById("chat-msgs");
  var d = document.createElement("div");
  d.className = "msg " + role;
  d.innerHTML = "<div class=\"bubble\">" + text + "</div>";
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
}

function sendChat() {
  var input = document.getElementById("chat-input");
  var msg = input.value.trim();
  if (!msg) return;
  input.value = "";
  addMsg("user", msg);
  chatHistory.push({role:"user", content:msg});
  document.getElementById("chat-send").disabled = true;

  var thinking = document.createElement("div");
  thinking.className = "msg assistant";
  thinking.innerHTML = "<div class=\"bubble\">...</div>";
  document.getElementById("chat-msgs").appendChild(thinking);

  var summary = Object.keys(userStatuses).slice(0,60).map(function(id) { return id + ":" + userStatuses[id]; }).join(", ");
  var system = "Du bist Assistent fuer ein Streaming-Dashboard. Status: want, watching, aborted, done. Bei Statusaenderung: <status_update>{id, status}</status_update>. Status: " + summary + ". Antworte auf Deutsch, kurz.";

  fetch(CLAUDE_API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514", max_tokens:600, system:system, messages:chatHistory})
  }).then(function(r) { return r.json(); }).then(function(data) {
    var text = data.content && data.content[0] ? data.content[0].text : "Keine Antwort.";
    var regex = /<status_update>([^<]+)<\/status_update>/g;
    var match;
    while ((match = regex.exec(text)) !== null) {
      try { var u = JSON.parse(match[1].trim()); if (u.id && u.status) userStatuses[u.id] = u.status; } catch(e) {}
    }
    var clean = text.replace(/<status_update>[^<]+<\/status_update>/g, "").trim();
    chatHistory.push({role:"assistant", content:clean});
    thinking.remove();
    addMsg("assistant", clean);
    document.getElementById("chat-send").disabled = false;
  }).catch(function() {
    thinking.remove();
    addMsg("assistant", "Verbindungsfehler.");
    document.getElementById("chat-send").disabled = false;
  });
}

// Events
document.querySelectorAll(".stab").forEach(function(t) {
  t.addEventListener("click", function() { switchTab(this.getAttribute("data-tab")); });
});

document.querySelectorAll(".typebtn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    currentType = this.getAttribute("data-type");
    document.querySelectorAll(".typebtn").forEach(function(b) { b.classList.remove("active"); });
    this.classList.add("active");
    if (currentTab === "browse") loadBrowse();
  });
});

document.getElementById("sort-select").addEventListener("change", function() {
  currentSort = this.value;
  if (currentTab === "browse") loadBrowse();
  else loadMyList(currentTab);
});

document.addEventListener("click", function(e) {
  var bar = document.getElementById("search-bar");
  var btn = document.getElementById("search-btn");
  var input = document.getElementById("search-input");
  if (bar.style.display === "block" && !bar.contains(e.target) && !btn.contains(e.target)) {
    bar.style.display = "none";
    input.value = "";
    switchTab(currentTab);
  }
});

document.getElementById("search-btn").addEventListener("click", function() {
  var bar = document.getElementById("search-bar");
  bar.style.display = bar.style.display === "none" ? "block" : "none";
  if (bar.style.display === "block") document.getElementById("search-input").focus();
});

document.getElementById("search-input").addEventListener("input", function() {
  clearTimeout(searchTimer);
  var val = this.value.trim();
  if (!val) { switchTab(currentTab); return; }
  searchTimer = setTimeout(function() {
    setLoading("Suche...");
    fetch(API + "?action=search&query=" + encodeURIComponent(val)).then(function(r) { return r.json(); }).then(function(items) {
      if (!items || !items.length) { setEmpty("&#128269;", "Keine Ergebnisse"); return; }
      var html = "<div class=\"section-title\">Suchergebnisse <span style=\"color:var(--text-muted);font-size:14px;font-weight:400\">(" + items.length + ")</span></div>";
      html += "<div class=\"grid\">" + items.map(cardHTML).join("") + "</div>";
      document.getElementById("main").innerHTML = html;
      attachCards();
    });
  }, 500);
});

document.getElementById("chat-fab").addEventListener("click", function() {
  var o = document.getElementById("chat-overlay");
  o.style.display = o.style.display === "none" ? "flex" : "none";
  if (o.style.display === "flex") document.getElementById("chat-send").disabled = false;
});
document.getElementById("chat-overlay").addEventListener("click", function(e) { if (e.target===this) this.style.display="none"; });
document.getElementById("chat-send").addEventListener("click", sendChat);
document.getElementById("chat-input").addEventListener("keydown", function(e) { if (e.key==="Enter") sendChat(); });
document.getElementById("modal-overlay").addEventListener("click", function(e) { if (e.target===this) this.style.display="none"; });

renderProviderBar();
loadStatuses(function() { switchTab("browse"); });
</script>
</body>
</html>
